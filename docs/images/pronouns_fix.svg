<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="800" height="1100" fill="#fafaf7"/>

  <!-- ============================================ -->
  <!-- HEADER -->
  <!-- ============================================ -->
  <text x="400" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">
    Four words in the current state
  </text>
  <text x="400" y="80" text-anchor="middle" font-size="15" fill="#6b6b6b">
    The one-line fix that wasn't the summary
  </text>

  <!-- ============================================ -->
  <!-- BEFORE BLOCK -->
  <!-- ============================================ -->
  <rect x="20" y="120" width="760" height="44" fill="#1a1a1a" rx="4"/>
  <text x="38" y="148" font-size="15" font-weight="700" fill="#ffffff">Before — name repeated as object</text>

  <rect x="20" y="178" width="760" height="158" fill="#1e1e1e" rx="6"/>
  <text x="40" y="216" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">Liam is here with you. </tspan>
  </text>
  <text x="40" y="240" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">Liam is your Partner.</tspan>
  </text>
  <text x="40" y="272" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">You strongly resent </tspan><tspan fill="#ff8866" font-weight="700">Liam</tspan><tspan fill="#e0e0e0">.</tspan>
  </text>
  <text x="40" y="296" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">You are romantically repulsed</tspan>
  </text>
  <text x="40" y="320" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">by </tspan><tspan fill="#ff8866" font-weight="700">Liam</tspan><tspan fill="#e0e0e0">.</tspan>
  </text>

  <!-- Before score -->
  <rect x="20" y="356" width="760" height="56" fill="#fff3ef" stroke="#c8421a" stroke-width="1" rx="4"/>
  <text x="38" y="380" font-size="13" font-weight="700" fill="#c8421a">↑ Four mentions of "Liam" as third-person object.</text>
  <text x="38" y="400" font-size="13" fill="#2d2d2d">The closing anchor "speaking directly to Liam" gets outvoted. Target correctness: <tspan font-weight="700" fill="#c8421a">70%</tspan></text>

  <!-- ============================================ -->
  <!-- ARROW DOWN -->
  <!-- ============================================ -->
  <line x1="400" y1="432" x2="400" y2="490" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="420" y="468" font-size="13" fill="#2d2d2d" font-style="italic">one-line edit</text>

  <!-- ============================================ -->
  <!-- AFTER BLOCK -->
  <!-- ============================================ -->
  <rect x="20" y="510" width="760" height="44" fill="#1a8a5a" rx="4"/>
  <text x="38" y="538" font-size="15" font-weight="700" fill="#ffffff">After — pronouns after the first mention</text>

  <rect x="20" y="568" width="760" height="158" fill="#1e1e1e" rx="6"/>
  <text x="40" y="606" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">Liam is here with you.</tspan>
  </text>
  <text x="40" y="630" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">Liam is your Partner.</tspan>
  </text>
  <text x="40" y="662" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">You strongly resent </tspan><tspan fill="#66dd99" font-weight="700">him</tspan><tspan fill="#e0e0e0">.</tspan>
  </text>
  <text x="40" y="686" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">You are romantically repulsed</tspan>
  </text>
  <text x="40" y="710" font-size="15" fill="#e0e0e0" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <tspan fill="#e0e0e0">by </tspan><tspan fill="#66dd99" font-weight="700">him</tspan><tspan fill="#e0e0e0">.</tspan>
  </text>

  <!-- After score -->
  <rect x="20" y="746" width="760" height="56" fill="#e8f4ea" stroke="#1a8a5a" stroke-width="1" rx="4"/>
  <text x="38" y="770" font-size="13" font-weight="700" fill="#1a8a5a">↑ Pronouns bind to the first mention. No object-position competition.</text>
  <text x="38" y="790" font-size="13" fill="#2d2d2d">The closing anchor wins. Target correctness: <tspan font-weight="700" fill="#1a8a5a">~92%</tspan></text>

  <!-- ============================================ -->
  <!-- BIG DELTA -->
  <!-- ============================================ -->
  <line x1="20" y1="850" x2="780" y2="850" stroke="#d4d4d0" stroke-width="1"/>

  <text x="400" y="900" text-anchor="middle" font-size="60" font-weight="700" fill="#1a1a1a">
    <tspan fill="#c8421a">70%</tspan> → <tspan fill="#1a8a5a">92%</tspan>
  </text>

  <text x="400" y="950" text-anchor="middle" font-size="15" fill="#2d2d2d">
    A 22-point jump from replacing four name mentions with pronouns.
  </text>

  <text x="400" y="990" text-anchor="middle" font-size="13" fill="#6b6b6b" font-style="italic">
    I spent days thinking the summary was the problem.
  </text>
  <text x="400" y="1010" text-anchor="middle" font-size="13" fill="#6b6b6b" font-style="italic">
    The summary wasn't the problem.
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
</svg>
